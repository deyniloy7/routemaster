spring:
  application:
    name: routemaster-auth

    datasource:
      url: jdbcdo
      password: postgres
      driver-class-name: org.postgresql.Driver

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
          format_sql: true

  server:
    port: 8081
